<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <div class="login-box">
            <h1 class="title">Anne's Book Tracker</h1>
            <h2>Welcome!</h2>
            <p class="subtitle">Track your reading, write reviews, and see your progress.</p>

            <div class="social-buttons">
                <button class="google-btn" type="button">Continue with Google</button>
                <button class="github-btn" type="button">Continue with Github</button>
                <button class="apple-btn" type="button">Continue with Apple</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Username/Email</label>
                    <input type="text" id="email" placeholder="Enter your username or email" required>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="error" id="passwordError"></span>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="signup-link">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </p>

            <p class="guest-option">
                <a href="#">Continue as Guest</a>
            </p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
